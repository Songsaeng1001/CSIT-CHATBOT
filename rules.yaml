# ════════════════════════════════════════════════════════════════
# น้องซีที — Rules for Rule-Augmented Reasoning (RAR)
# อ้างอิงจากข้อบังคับมหาวิทยาลัยนเรศวร ว่าด้วยการศึกษาระดับปริญญาตรี พ.ศ. 2565
# และคู่มือนิสิตระดับปริญญาตรี ปีการศึกษา 2568
# ════════════════════════════════════════════════════════════════

# ─── หน่วยกิตที่ลงทะเบียนได้ ─────────────────────────────
registration_credits:
  undergraduate:
    normal_semester_max: 22       # หน่วยกิตสูงสุดต่อภาคปกติ (ระดับปริญญาตรี)
    summer_max: 9                 # หน่วยกิตสูงสุดต่อภาคฤดูร้อน
  graduate:
    normal_semester_max: 15
    summer_max: 6

# ─── ค่าปรับและค่าธรรมเนียม ──────────────────────────────
penalties:
  late_registration_per_day: 25       # บาท/วัน ค่าปรับลงทะเบียนล่าช้า
  late_registration_max_days: 14      # วัน หลังจากนี้พ้นสภาพ
  late_drop_form_fee: 10              # บาท/ครั้ง ค่าถอนรายวิชา
  reinstatement_fee:
    undergraduate: 1000                # บาท ค่าคืนสภาพนิสิต ป.ตรี
    graduate: 2000                     # บาท ค่าคืนสภาพนิสิต บัณฑิตศึกษา
  late_per_week:
    undergraduate: 100                 # บาท/สัปดาห์
    graduate: 200                      # บาท/สัปดาห์
  graduation_late_per_day: 50          # บาท/วันทำการ ยื่นจบล่าช้า
  course_transfer_fee: 100             # บาท/ครั้ง ค่าเทียบโอนรายวิชา

# ─── ค่าธรรมเนียมขึ้นทะเบียนปริญญาบัตร ────────────────────
graduation_fees:
  undergraduate: 2000                  # บาท
  graduate: 2500                       # บาท

# ─── เกณฑ์เกียรตินิยม ────────────────────────────────────
honors:
  first_class:
    name: "เกียรตินิยมอันดับหนึ่ง"
    min_gpa: 3.50
    requirements:
      - "ไม่เคยได้รับระดับขั้น F หรืออักษร U"
      - "ไม่เคยลงทะเบียนเรียนซ้ำในรายวิชาใดๆ"
      - "เทียบโอนหน่วยกิตไม่เกิน 1/6 ของหน่วยกิตรวมตลอดหลักสูตร"
  second_class:
    name: "เกียรตินิยมอันดับสอง"
    min_gpa: 3.25
    max_gpa: 3.49
    requirements:
      - "ไม่เคยได้รับระดับขั้น F หรืออักษร U"
      - "ไม่เคยลงทะเบียนเรียนซ้ำในรายวิชาใดๆ"
      - "เทียบโอนหน่วยกิตไม่เกิน 1/6 ของหน่วยกิตรวมตลอดหลักสูตร"

# ─── สถานภาพนิสิตและการพ้นสภาพ ───────────────────────────
academic_status:
  pass_min_gpa: 2.00              # GPA ขั้นต่ำที่ถือว่าปกติ
  probation_threshold: 2.00       # ต่ำกว่านี้ = รอพินิจ
  dismissal:
    after_2_semesters: 1.50       # หลัง 2 ภาค GPA < 1.50 = พ้นสภาพ
    after_4_semesters: 1.75       # หลัง 4 ภาคขึ้นไป GPA < 1.75 = พ้นสภาพ

# ─── ระยะเวลาการสำเร็จการศึกษา (ภาคการศึกษา) ──────────────
graduation_duration:
  bachelor_4year:
    min_semesters_fulltime: 6
    max_semesters_fulltime: 8     # 4 ปี = 8 ภาคปกติ
    min_semesters_parttime: 14
  bachelor_5year:
    min_semesters_fulltime: 8
    max_semesters_fulltime: 10
    min_semesters_parttime: 17
  bachelor_6year:
    min_semesters_fulltime: 10
    max_semesters_fulltime: 12
    min_semesters_parttime: 20
  bachelor_continued:
    min_semesters_fulltime: 4
    min_semesters_parttime: 8
  second_degree:
    min_semesters_fulltime: 2
    min_semesters_parttime: 3

# ─── ระบบระดับขั้นและค่าคะแนน ────────────────────────────
grade_points:
  A: 4.00
  "B+": 3.50
  B: 3.00
  "C+": 2.50
  C: 2.00
  "D+": 1.50
  D: 1.00
  F: 0.00

grade_meanings:
  A: "ดีเยี่ยม (Excellent)"
  "B+": "ดีมาก (Very Good)"
  B: "ดี (Good)"
  "C+": "ดีพอใช้ (Fairly Good)"
  C: "พอใช้ (Fair)"
  "D+": "อ่อน (Poor)"
  D: "อ่อนมาก (Very Poor)"
  F: "ตก (Failed)"
  S: "เป็นที่พอใจ (Satisfactory)"
  U: "ไม่เป็นที่พอใจ (Unsatisfactory)"
  I: "การวัดผลยังไม่สมบูรณ์ (Incomplete)"
  P: "การเรียนการสอนยังไม่สิ้นสุด (In Progress)"
  W: "การถอนรายวิชา (Withdrawn)"

# ─── เกณฑ์รางวัลเรียนดี ──────────────────────────────────
academic_awards:
  yearly:
    min_credits: 32              # ลง ≥32 หน่วยกิตใน 2 ภาคปกติ
    min_gpa: 3.75
    must_not_have_grades:
      - F
      - U
    excluded: "นิสิตปีสุดท้ายของหลักสูตรไม่อยู่ในข่ายของสิทธิ์"
  gold_medal:
    requirement: "เกียรตินิยมอันดับหนึ่ง + GPA ตลอดหลักสูตร ≥ 3.75"

# ─── เกณฑ์ความรู้ภาษาอังกฤษ (CEPT) ────────────────────────
english_requirement:
  thai_program:
    level: "A2"
    min_score: 27
    description: "นิสิตหลักสูตรไทยที่ไม่ใช่นานาชาติ"
  international_program:
    level: "B1"
    min_score: 35
    description: "นิสิตหลักสูตรนานาชาติ"
  transfer_deadline: "ก่อนสัปดาห์สอบกลางภาค"

# ─── เกณฑ์ความรู้คอมพิวเตอร์ ─────────────────────────────
computer_requirement:
  min_percent: 50
  levels:
    excellent:
      range: [84, 100]
      label: "ดีมาก"
    good:
      range: [68, 83]
      label: "ดี"
    fair:
      range: [50, 67]
      label: "พอใช้"
    needs_improvement:
      range: [0, 49]
      label: "ควรปรับปรุง"

