# ─── การถอนรายวิชา ───────────────────────────────────────
course_withdrawal:
  within_2_weeks: "ไม่ติด W, เสียค่าใช้จ่าย 10 บาท/ครั้ง"
  after_2_weeks: "ติดอักษร W ในระเบียนผลการเรียน"
  max_week: 12                    # ไม่เกินสัปดาห์ที่ 12 ของภาคเรียน

# ─── เวลาเรียนขั้นต่ำเพื่อมีสิทธิ์สอบ ─────────────────────
attendance:
  min_percent: 80                 # ต้องเข้าเรียน ≥80% ของเวลาเรียน
  consequence: "ผู้ไม่มีสิทธิ์สอบจะได้รับ F หรือ U"

# ─── กยศ. ─────────────────────────────────────────────────
student_loan:
  voluntary_hours_per_year: 36    # ชั่วโมงจิตอาสาต่อปี
  voluntary_period: "1 พฤษภาคม - 30 เมษายน"
  basic_elearning_hours: 6        # ชั่วโมง SET e-Learning ภาคบังคับ
  cost_of_living_transfer_days: 30  # วัน โอนค่าครองชีพหลัง upload สัญญา
  freshman_first_semester: "ต้องสำรองเงินจ่ายค่าเทอมก่อน"

# ─── รหัสรายวิชา ─────────────────────────────────────────
course_code_meaning:
  pattern: "AAA-B-C-D"
  AAA:
    description: "รหัสสาขา"
    examples:
      "254": "วิทยาการคอมพิวเตอร์ (CS)"
      "273": "เทคโนโลยีสารสนเทศ (IT)"
      "001": "วิชาศึกษาทั่วไป"
      "002": "ไม่นับเป็นวิชาเลือกเสรี"
  B: "ชั้นปีที่ควรเรียน (หลักร้อย)"
  C:
    description: "หมวดวิชา (หลักสิบ)"
    values:
      "1": "วิชาทั่วไป"
      "4": "การคำนวณ"
      "5": "ข้อมูล"
      "6": "ระบบ"
      "7": "ภาษาโปรแกรม"
      "8": "ประยุกต์"
      "9": "การศึกษาอิสระ/สัมมนา/วิจัย"
  D: "ลำดับของรายวิชาในหมวด (หลักหน่วย)"

