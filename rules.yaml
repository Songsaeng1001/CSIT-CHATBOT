# ─── วิชาเลือกเสรี — เงื่อนไข ────────────────────────────
free_elective:
  min_credits: 6
  excluded_codes:
    - "001"   # วิชาศึกษาทั่วไป
    - "002"   # ไม่นับเป็นเลือกเสรี

# ─── Prerequisite Rules ──────────────────────────────────
prerequisite:
  min_grade: "D"                  # ต้องได้ ≥ D จึงลงวิชาต่อเนื่องได้
  violation_result: "ลงทะเบียนผิดเงื่อนไข = โมฆะ, ติดอักษร W"