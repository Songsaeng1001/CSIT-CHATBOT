# ══════════════════════════════════════════════════════════════
# SECTION 1: การลงทะเบียนเรียน
# ══════════════════════════════════════════════════════════════

registration:

  # --- หน่วยกิตสูงสุดต่อภาค ---
  credit_limits:
    undergraduate:
      normal_semester_max: 22         # ภาคปกติ (ป.ตรี)
      summer_max: 9                   # ภาคฤดูร้อน (ป.ตรี)
      note: "ต้องการลงเกินต้องยื่น NU18 ผ่านอาจารย์ที่ปรึกษาและคณบดี"
    graduate:
      normal_semester_max: 15         # ภาคปกติ (บัณฑิตศึกษา)
      summer_max: 6                   # ภาคฤดูร้อน (บัณฑิตศึกษา)

  # --- ประเภทการลงทะเบียน ---
  types:
    GD:
      name: "Grade Display"
      description: "เรียนแบบนับหน่วยกิตและคำนวณ GPA (ปกติ)"
    SU:
      name: "Satisfactory/Unsatisfactory"
      description: "เรียนแบบได้เกรด S หรือ U นับหน่วยกิตแต่ไม่คำนวณ GPA"
    AU:
      name: "Audit"
      description: "เรียนแบบไม่นับหน่วยกิต ไม่คำนวณ GPA"
    GT:
      name: "Grade Transfer"
      description: "ขอลงทะเบียนเรียนเทียบหน่วยกิต"

  # --- กรณีเพิ่ม-ถอนรายวิชา ---
  add_drop:
    within_deadline_weeks: 2          # ต้องทำภายใน 2 สัปดาห์แรก (ภาคปกติ)
    within_deadline_weeks_summer: 1   # ภาคฤดูร้อน = 1 สัปดาห์
    add_fee: 0                        # ไม่มีค่าใช้จ่ายในการเพิ่มรายวิชา
    drop_fee_per_time: 10             # บาท/ครั้ง สำหรับถอนรายวิชา
    drop_no_W_if_within: "2 สัปดาห์แรก"
    drop_get_W_if_after: "หลัง 2 สัปดาห์แรก จะติด W ในทรานสคริปต์"
    max_week_to_drop: 12              # ถอนได้ไม่เกินสัปดาห์ที่ 12 ของภาค
    late_add_form: "NU8"
    late_add_penalty_per_week: 100    # บาท/สัปดาห์ (ป.ตรี)
    late_add_max_weeks: 5             # เพิ่มได้ไม่เกิน 5 สัปดาห์หลังหมดกำหนด

  # --- กรณีลงทะเบียนล่าช้า ---
  late_registration:
    penalty_per_day: 25               # บาท/วัน
    max_late_weeks_before_dismissed: 2  # หลัง 2 สัปดาห์ = พ้นสภาพ
    reinstatement_form: "NU7"
    reinstatement_fee_undergraduate: 1000   # บาท
    reinstatement_fee_graduate: 2000        # บาท
    late_penalty_per_week_undergraduate: 100  # บาท/สัปดาห์ หลังพ้นสภาพ
    late_penalty_per_week_graduate: 200       # บาท/สัปดาห์
    max_reinstatement_weeks: 5        # ขอคืนสภาพได้ไม่เกิน 5 สัปดาห์

  # --- กรณีพิเศษ: รายวิชาที่ไม่ได้สำรองที่นั่ง ---
  reserved_section:
    form: "NU6"
    name: "แบบขอเปลี่ยนแปลงการสอนรายวิชา"
    process: >
      นิสิตยื่น NU6 ผ่านอาจารย์ที่ปรึกษา → คณบดีต้นสังกัดนิสิต →
      อาจารย์ผู้สอน → ภาควิชา → คณะต้นสังกัดรายวิชา
      (เพื่อสำรองที่นั่งในระบบ)
    note: "หากพ้นกำหนด เพิ่ม-ถอนแล้ว ให้ยื่น NU8 พร้อมแนบ NU6"
    exception: "ยกเว้นวิชาศึกษาทั่วไปที่สำรองตามแผนการเรียนของแต่ละหลักสูตร"

  # --- กรณีย้ายคณะ/สาขา ---
  transfer:
    advance_notice_weeks: 4           # ควรยื่นก่อนวันลงทะเบียนอย่างน้อย 4 สัปดาห์
    form: "NU13"
    within_faculty: "ผ่านอาจารย์ที่ปรึกษา → คณบดีต้นสังกัด"
    across_faculty: "ผ่านอาจารย์ที่ปรึกษา → คณบดีเดิม → คณบดีใหม่ → งานทะเบียนฯ"
    loan_impact: >
      นิสิตผู้กู้ กยศ. ที่ย้ายสาขา/คณะในเทอม 2 ต้องทำสัญญาใหม่
      ในเทอม 1 ของปีถัดไป (ไม่สามารถกู้ในเทอม 2 ได้ทันที)

  # --- กรณีลงทะเบียนเรียนซ้ำ ---
  repeat_enrollment:
    allowed_if_grade_below_C: true
    mandatory_if_failed_compulsory_F: true
    mandatory_if_failed_compulsory_U: true
    if_section_full_use_form: "NU6"

  # --- Prerequisite ---
  prerequisite:
    min_grade_required: "D"           # ต้องได้ ≥ D จึงลงวิชาต่อเนื่องได้
    violation_result: "การลงทะเบียนเป็นโมฆะ และได้รับอักษร W"

  # --- รายวิชาเลือกเสรี ---
  free_elective:
    min_credits: 6
    excluded_codes:
      "001xxx": "วิชาศึกษาทั่วไป ไม่นับเป็นวิชาเลือกเสรี"
      "002xxx": "ไม่สามารถนำมานับหน่วยกิตในหมวดเลือกเสรีได้"

  # --- ระบบทะเบียนออนไลน์ ---
  online_system:
    url: "https://www.reg.nu.ac.th"
    enrollment_guide: "https://reg4.nu.ac.th/enrollguide.html"
    academic_calendar: "https://reg4.nu.ac.th/registrar/calendar.asp?avs727811069=1"
    student_manual_pdf: "https://reg4.nu.ac.th/publish/studentmanual2025_b.pdf"
    nu_app_manual_student: "https://reg.nu.ac.th/manual/1.man-user/3.Mobile/MAN_MB-NU67-REG-1-9.STU-Mobile.pdf"
    nu_app_manual_instructor: "https://reg.nu.ac.th/manual/1.man-user/3.Mobile/MAN_MB-NU67-REG-1-10.Ins-Mobile.pdf"
    password_change: "https://password.nu.ac.th"
    password_rules: "ตัวอักษร+ตัวเลข+สัญลักษณ์ (a-z, 0-9, @, *, #, &, %, $) ≥6 ตัว ต้องขึ้นต้นด้วยตัวอักษร"


# ══════════════════════════════════════════════════════════════
# SECTION 2: การวัดและประเมินผลการศึกษา
# ══════════════════════════════════════════════════════════════

grading:

  # --- ระบบเกรดและค่าคะแนน ---
  grade_points:
    A:   { value: 4.00, meaning: "ดีเยี่ยม (Excellent)" }
    "B+": { value: 3.50, meaning: "ดีมาก (Very Good)" }
    B:   { value: 3.00, meaning: "ดี (Good)" }
    "C+": { value: 2.50, meaning: "ดีพอใช้ (Fairly Good)" }
    C:   { value: 2.00, meaning: "พอใช้ (Fair)" }
    "D+": { value: 1.50, meaning: "อ่อน (Poor)" }
    D:   { value: 1.00, meaning: "อ่อนมาก (Very Poor)" }
    F:   { value: 0.00, meaning: "ตก (Failed)" }

  # --- สัญลักษณ์พิเศษ (ไม่คิด GPA) ---
  special_grades:
    S:  "เป็นที่พอใจ (Satisfactory) — นับหน่วยกิต ไม่คิด GPA"
    U:  "ไม่เป็นที่พอใจ (Unsatisfactory) — นับหน่วยกิต ไม่คิด GPA"
    I:  "การวัดผลยังไม่สมบูรณ์ (Incomplete) — ต้องแก้ภายใน 4 สัปดาห์นับจากเปิดภาคถัดไป"
    P:  "การเรียนการสอนยังไม่สิ้นสุด (In Progress) — ใช้เฉพาะรายวิชาที่มหาวิทยาลัยกำหนด"
    W:  "การถอนรายวิชา (Withdrawn)"
    CA: "Credit Attempt — หน่วยกิตที่ลงทะเบียนและนับหน่วยกิต"
    GP: "Grade Point — ผลรวมของค่าระดับขั้น × หน่วยกิตในภาค"
    GPA: "Grade Point Average = GP ÷ CA"

  # --- เกณฑ์เพื่อมีสิทธิ์สอบ ---
  exam_eligibility:
    min_attendance_percent: 80
    consequence_if_below: "ได้รับ F หรือ U ทันที"

  # --- การแก้ไขอักษร I และ P ---
  incomplete_resolution:
    I_deadline: "ภายใน 4 สัปดาห์นับจากวันเปิดภาคการศึกษาปกติถัดไป"
    I_if_not_resolved: "เปลี่ยนเป็น F หรือ U"
    P_resolved_when: "ผู้สอนส่ง NU33 เมื่อมีการวัดผลเสร็จสิ้น"
    note_for_graduation: >
      วันสำเร็จการศึกษา = วันที่ผู้สอนส่ง NU33 แก้อักษร I หรือ P ถึงงานทะเบียนฯ
      นิสิตต้องมีสถานภาพเป็นนิสิตในขณะนั้นด้วย

  # --- การคำนวณ GPA ---
  gpa_calculation:
    note_S_U_I_P_W: "ไม่นำมาคำนวณ GPA"
    repeat_course: >
      หากลงทะเบียนรายวิชาเดิมมากกว่า 1 ครั้ง ใช้ GPA จากครั้งสุดท้ายที่ลงเท่านั้น
    transfer_credits: >
      นิสิตที่ย้ายสถานศึกษา คำนวณ GPA เฉพาะรายวิชาที่เรียนใหม่ในมหาวิทยาลัยนเรศวร


# ══════════════════════════════════════════════════════════════
# SECTION 3: สถานภาพนิสิตและการพ้นสภาพ
# ══════════════════════════════════════════════════════════════

academic_status:

  # --- นิยามสถานภาพ ---
  definitions:
    normal:
      label: "นิสิตปกติ"
      condition: "GPA สะสม ≥ 2.00"
    probation:
      label: "นิสิตรอพินิจ"
      condition: "GPA สะสม < 2.00"

  # --- เกณฑ์พ้นสภาพจากผลการเรียน ---
  dismissal_by_gpa:
    after_2_semesters:
      threshold: 1.50
      rule: "เรียนครบ 2 ภาคปกติแล้ว GPA สะสม < 1.50 → พ้นสภาพ"
    after_4_or_more_semesters:
      threshold: 1.75
      rule: "เรียนครบ 4 ภาคปกติขึ้นไปแล้ว GPA สะสม < 1.75 → พ้นสภาพ"
    note: "ผลภาคฤดูร้อนนำไปรวมกับภาค 1 ของปีถัดไป ภาคที่ลาพักไม่นับ"

  # --- เกณฑ์พ้นสภาพอื่น ๆ ---
  other_dismissal_reasons:
    - "ลาออก"
    - "เสียชีวิต"
    - "โอนไปสถานศึกษาอื่น"
    - "ขาดคุณสมบัติการเข้าศึกษา"
    - "ไม่ลงทะเบียนภายในเวลาที่กำหนด"
    - "มีความประพฤติไม่สมควรเป็นนิสิต"
    - "ศึกษาเกินระยะเวลาสูงสุด 2 เท่าของหลักสูตร"

  # --- การขอคืนสภาพ ---
  reinstatement:
    form: "NU7"
    process: "ผ่านคณบดีต้นสังกัด → งานทะเบียนฯ → ชำระค่าธรรมเนียม"
    time_limit: "ภายใน 5 สัปดาห์นับจากวันพ้นสภาพ"
    not_allowed_if: "พ้นสภาพเกิน 2 ปี"
    fee_undergraduate: 1000
    fee_graduate: 2000

  # --- การลาพักการศึกษา ---
  leave_of_absence:
    form: "NU17"
    valid_reasons:
      - "ถูกเกณฑ์ทหาร"
      - "ได้รับทุนแลกเปลี่ยนต่างประเทศ"
      - "เจ็บป่วยหนัก"
      - "เหตุผลอื่นที่คณะเห็นสมควร"
    requirement: "ผู้ปกครองต้องลงนามยินยอม (ป.ตรี)"
    maintenance_fee: "ต้องชำระค่ารักษาสภาพนิสิตทุกภาคที่ลา"
    deadline: "ภายใน 15 วันนับจากวันเปิดภาค"
    note: "ภาคที่ลาพักไม่นับในการคำนวณสถานภาพนิสิต"


# ══════════════════════════════════════════════════════════════
# SECTION 4: การสำเร็จการศึกษา
# ══════════════════════════════════════════════════════════════

graduation:

  # --- คุณสมบัติสำเร็จการศึกษา ป.ตรี ---
  requirements_undergraduate:
    credits_complete: "เรียนครบตามโครงสร้างหลักสูตรและเงื่อนไขสาขาวิชา"
    no_incomplete: "ไม่มีรายวิชาใดได้รับอักษร I หรือ P"
    min_gpa: 2.00
    english_test: "ผ่านเกณฑ์ CEPT ตามประกาศมหาวิทยาลัย"
    computer_test: "ผ่านเกณฑ์ทดสอบคอมพิวเตอร์ฯ (≥50%)"
    no_debt: "ไม่มีหนี้สินกับมหาวิทยาลัย"

  # --- ระยะเวลาศึกษา ---
  duration:
    bachelor_4year:
      min_fulltime: 6                 # ภาคปกติ (เร็วสุด)
      max_fulltime: 8                 # ภาคปกติ (4 ปี)
      max_allowed: 16                 # 2 เท่าของ 8 = ไม่เกิน 16 ภาค
      min_parttime: 14
    bachelor_5year:
      min_fulltime: 8
      max_fulltime: 10
      min_parttime: 17
    bachelor_6year_plus:
      min_fulltime: 10
      max_fulltime: 12
      min_parttime: 20
    bachelor_continued:
      min_fulltime: 4
      min_parttime: 8
    second_degree:
      min_fulltime: 2
      min_parttime: 3

  # --- ขั้นตอนการยื่นสำเร็จการศึกษา ---
  application_process:
    form: "NU25"
    deadline: "ภายใน 4 สัปดาห์นับจากวันเปิดภาคการศึกษาสุดท้าย"
    steps:
      1: "บันทึกข้อมูลแจ้งจบที่ www.reg.nu.ac.th → เมนู ตรวจสอบจบ → แจ้งจบสำเร็จการศึกษา"
      2: "พิมพ์แบบฟอร์ม NU25 และลงชื่อ"
      3: "ชำระค่าธรรมเนียมขึ้นทะเบียนปริญญาบัตร"
      4: "ยื่นเอกสารที่คณะหรืองานทะเบียนฯ พร้อมรูปถ่ายชุดครุย 2 รูป (ขนาด 2 นิ้ว ไม่เกิน 6 เดือน)"
      5: "ลงชื่อในสมุดคุมการยื่นสำเร็จการศึกษา"
    fees:
      undergraduate: 2000             # บาท
      graduate: 2500                  # บาท
    late_submission:
      form: "NU9"
      penalty_per_working_day: 50     # บาท/วันทำการ
    re_submission: >
      หากเคยยื่นแล้วแต่ยังไม่สำเร็จ (เช่น ติด I/P/U หรือ GPA ไม่ถึง 2.00)
      ต้องยื่นใหม่ทุกภาคที่คาดว่าจะสำเร็จ (ไม่ต้องจ่ายค่าธรรมเนียมซ้ำ)

  # --- เกียรตินิยม ---
  honors:
    first_class:
      name: "เกียรตินิยมอันดับหนึ่ง"
      min_gpa: 3.50
      conditions:
        - "ไม่เคยได้รับ F หรือ U"
        - "ไม่เคยลงทะเบียนเรียนซ้ำรายวิชาใดๆ"
        - "เทียบโอนหน่วยกิตไม่เกิน 1/6 ของหน่วยกิตรวมทั้งหลักสูตร"
    second_class:
      name: "เกียรตินิยมอันดับสอง"
      min_gpa: 3.25
      max_gpa: 3.49
      conditions:
        - "ไม่เคยได้รับ F หรือ U"
        - "ไม่เคยลงทะเบียนเรียนซ้ำรายวิชาใดๆ"
        - "เทียบโอนหน่วยกิตไม่เกิน 1/6 ของหน่วยกิตรวมทั้งหลักสูตร"

  # --- รางวัลเรียนดี ---
  academic_awards:
    annual_certificate:
      label: "รางวัลเรียนดีประจำปี (เกียรติบัตร)"
      min_credits_per_year: 32        # ลง ≥32 หน่วยกิตใน 2 ภาคปกติ
      min_gpa: 3.75
      must_not_have: ["F", "U"]
      excluded: "นิสิตปีสุดท้ายของหลักสูตร"
    gold_medal:
      label: "เหรียญทองเรียนดีตลอดหลักสูตร"
      condition: "เกียรตินิยมอันดับหนึ่ง + GPA ตลอดหลักสูตร ≥ 3.75"


# ══════════════════════════════════════════════════════════════
# SECTION 5: เกณฑ์ภาษาอังกฤษและคอมพิวเตอร์
# ══════════════════════════════════════════════════════════════

competency_tests:

  english:
    test_name: "CEPT (ดำเนินการโดยกองพัฒนาภาษาและกิจการต่างประเทศ)"
    when_tested: "ปีการศึกษาแรกที่เข้าศึกษา"
    passing_score:
      thai_program:
        cefr_level: "A2"
        min_score: 27
        description: "นิสิตหลักสูตรไทย (ไม่ใช่นานาชาติ)"
      international_program:
        cefr_level: "B1"
