nu_forms:
  NU1:
    name: "ระเบียนประวัตินิสิต"
    category: "ข้อมูลนิสิตใหม่"
  NU3:
    name: "คู่มือลงทะเบียนเรียน"
    category: "ลงทะเบียน"
  NU4:
    name: "แบบขอเปิดรายวิชา/หมู่เรียน (เพิ่ม)"
    category: "ลงทะเบียน"
  NU5:
    name: "แบบขอปิดรายวิชา/หมู่เรียน"
    category: "ลงทะเบียน"
  NU6:
    name: "แบบขอเปลี่ยนแปลงการสอนรายวิชา"
    category: "ลงทะเบียน"
    purpose: "ใช้เมื่อรายวิชาไม่ได้สำรองที่นั่งให้หลักสูตรของนิสิต"
    process: "นิสิต → อาจารย์ที่ปรึกษา → คณบดีต้นสังกัดนิสิต → อาจารย์ผู้สอน → ภาควิชา → คณะต้นสังกัดรายวิชา"
  NU7:
    name: "คำร้องขอคืนสภาพการเป็นนิสิต"
    category: "ลงทะเบียน"
    purpose: "ใช้เมื่อพ้นสภาพและต้องการกลับมาเป็นนิสิต"
    fee_undergraduate: 1000
    fee_graduate: 2000
    process: "ผ่านคณบดีต้นสังกัด → งานทะเบียนฯ → ชำระค่าธรรมเนียม"
  NU8:
    name: "คำร้องขอเพิ่มรายวิชาหลังกำหนด"
    category: "ลงทะเบียน"
    purpose: "ใช้เพิ่มรายวิชาหลังพ้น 2 สัปดาห์แรกของภาค"
    penalty_per_week: 100
    max_weeks: 5
    note: "หากรายวิชาไม่ได้สำรองที่นั่ง ต้องแนบ NU6 ด้วย"
  NU9:
    name: "คำร้องขอยื่นสำเร็จการศึกษาล่าช้ากว่ากำหนด"
    category: "สำเร็จการศึกษา"
    penalty_per_working_day: 50
  NU11:
    name: "แบบขอถอนรายวิชา (ติด W)"
    category: "ลงทะเบียน"
    deadline: "ไม่เกินสัปดาห์ที่ 12 ของภาคเรียน"
  NU13:
    name: "คำร้องขอย้ายคณะ/สาขาวิชา"
    category: "ระเบียนประวัติ"
    note: "ควรยื่นก่อนวันลงทะเบียนอย่างน้อย 4 สัปดาห์"
  NU14:
    name: "คำร้องขอเทียบโอนรายวิชา"
    category: "ลงทะเบียน"
    fee: 100
    requirement: "ผลการเรียนรายวิชาที่ขอเทียบต้องได้ ≥ C"
    must_study_at_nu: "≥ 1 ปีการศึกษา"
    process: "นิสิต → อาจารย์ที่ปรึกษา → คณบดี → งานทะเบียนฯ → ชำระ 100 บาท"
  NU15:
    name: "คำร้องขอใบแสดงผลการเรียน (Transcript)"
    category: "เอกสารสำคัญ"
    online: true
    payment: "K PLUS (ธนาคารกสิกรไทย)"
    delivery:
      file: "ดาวน์โหลดได้ภายใน 1 ชั่วโมง"
      mail: "รอรับภายใน 3–5 วันทำการ"
  NU16:
    name: "คำร้องขอเปลี่ยนชื่อ ชื่อสกุล ยศ"
    category: "ระเบียนประวัติ"
    process: "แนบสำเนาหลักฐานราชการ → อาจารย์ที่ปรึกษารับทราบ → งานทะเบียนฯ"
  NU17:
    name: "คำร้องขอลาพักการศึกษา"
    category: "ระเบียนประวัติ"
    requirement_undergraduate: "ผู้ปกครองต้องลงนามยินยอม"
    process: "นิสิต → อาจารย์ที่ปรึกษา → คณบดี"
  NU18:
    name: "คำร้องทั่วไป"
    category: "ลงทะเบียน"
    common_uses:
      - "ขอลงทะเบียนเรียนมากกว่าเกณฑ์ (ระบุหน่วยกิตรวมและเหตุผล)"
      - "ขอเทียบรายวิชา (กรณีหลักสูตรปรับปรุงแล้วรหัสเปลี่ยน)"
  NU19:
    name: "คำร้องขอลาออกจากการศึกษา"
    category: "ระเบียนประวัติ"
    requirement_undergraduate: "ผู้ปกครองต้องลงนามยินยอม"
  NU20:
    name: "ใบแจ้งยอดชำระเงิน"
    category: "ลงทะเบียน"
  NU21:
    name: "คำร้องขอใบรับรอง"
    category: "เอกสารสำคัญ"
    online: true
  NU24:
    name: "ใบมอบฉันทะ"
    category: "ลงทะเบียน"
  NU25:
    name: "แบบขอสำเร็จการศึกษา"
    category: "สำเร็จการศึกษา"
    deadline: "ภายใน 4 สัปดาห์หลังเปิดภาคเรียนสุดท้าย"
    fee_undergraduate: 2000
    fee_graduate: 2500
    required_docs:
      - "แบบฟอร์ม NU25 ลงชื่อแล้ว"
      - "รูปถ่ายชุดครุย ขนาด 2 นิ้ว จำนวน 2 รูป (ไม่เกิน 6 เดือน)"
      - "หลักฐานชำระค่าธรรมเนียมขึ้นทะเบียนปริญญาบัตร"
  NU26:
    name: "ปฏิทินการศึกษา"
    category: "สารนิเทศ"
  NU32:
    name: "แบบรายงานผลการเรียนรายวิชา"
    category: "ประมวลผลข้อมูล"
  NU33:
    name: "แบบแก้ไขผลการเรียนรายวิชา"
    category: "ประมวลผลข้อมูล"
    purpose: "ใช้แก้อักษร I หรือ P"
    who_submits: "อาจารย์ผู้สอน (ไม่ใช่นิสิต)"


